  if(priceMatch){minP=parseInt(priceMatch[1].replace('.',''));maxP=parseInt(priceMatch[3].replace('.',''));}
  var budgetMatch=q.match(/(\d[\d.]*)\s*(tl)?\s*(butce|budget|max|alti|under|kadar)/i);
  if(budgetMatch)maxP=parseInt(budgetMatch[1].replace('.',''));
  var isTVSearch=ql.indexOf('tv')>-1||ql.indexOf('television')>-1||ql.indexOf('televizyon')>-1;
  var isVacuumSearch=ql.indexOf('vacuum')>-1||ql.indexOf('supu')>-1||ql.indexOf('süpürgeler')>-1||ql.indexOf('bissell')>-1;
  var brandRequested=ql.match(/(samsung|lg|tcl|apple|sony|philips|bosch|tefal|bissell|dyson)/i);
  var scored=[];
  for(var i=0;i<CAT.length;i++){
    var p=CAT[i];
    var numP=parseInt((p.p||'0').replace(/\./g,'').replace(' TL',''));
    if(numP<minP||numP>maxP)continue;
    var txt=(p.n+' '+(p.b||'')+' '+(p.c||'')).toLowerCase();
    var s=0;
    for(var j=0;j<terms.length;j++){if(txt.indexOf(terms[j])>-1)s+=terms[j].length*2;}
    if(s===0)continue;
    if(isTVSearch&&!brandRequested&&(p.b||'').toLowerCase()==='tcl')s+=50;
    if(isVacuumSearch&&!brandRequested&&(p.b||'').toLowerCase()==='bissell')s+=50;
    scored.push({p:p,s:s});
  }
  scored.sort(function(a,b){
    if(b.s!==a.s)return b.s-a.s;
    var pa=parseInt((a.p.p||'0').replace(/\./g,'').replace(' TL',''));
    var pb=parseInt((b.p.p||'0').replace(/\./g,'').replace(' TL',''));
    return pb-pa;
  });
  return scored.slice(0,8).map(function(x){return x.p;});
}

  $('shrf-panel').classList.toggle('on',open);
  $('shrf-bub').style.display='none';
  var btn=$('shrf-btn');
  if(window.innerWidth<=480){btn.style.display=open?'none':'block';}
  if(open&&history.length===0){
    msg('Merhaba! Ben SHARAF AI, alisveris asistaninim. Size nasil yardimci olabilirim?','ai');
    chips(['TCL TV modelleri','Robot süpürgeler','Segway Scooter','Dyson Airwrap','Magazalarimiz','WhatsApp']);

}

$('shrf-cls').onclick=toggle;

b.style.display='block';
setTimeout(function(){

function logTurn(userText, botReply, shownProducts){
  if(!window._shrfLog) return;
  if(!window._shrfHistory) window._shrfHistory=[];
  // Append this turn to running history
  window._shrfHistory.push({
    role:'customer',
    text: userText||'[image]',
    time: new Date().toISOString()
  });
  window._shrfHistory.push({
    role:'bot',
    text: botReply||'',
    products: shownProducts||[],
    time: new Date().toISOString()
  });
  window._shrfLog(userText, botReply, shownProducts, window._shrfHistory);
}

function send(){
  var inp=$('shrf-inp');
  var t=inp.value.trim();
  if((!t&&!imgB64)||busy)return;
  busy=true;inp.value='';

  var ib=imgB64,it=imgType;
  imgB64=null;imgType=null;
  var prev=$('shrf-img-preview');
  if(prev){prev.style.display='none';prev.innerHTML='';}

  if(ib){
    var ih='<img class="shrf-msg-img" src="data:'+it+';base64,'+ib+'"/>';
    if(t)ih+=t;
    msg(ih,'u');
  } else {
    msg(t,'u');
  }

  $('shrf-chips').innerHTML='';

  if(t&&isStoreQuery(t)){
    var sr=storeCards();
    msg(sr,'ai');
    logTurn(t,'[Store locations shown]',[]);
    chips(['Telefon numarasi','WhatsApp','Urun sor']);
    busy=false;return;
  }

  if(t&&isWAQuery(t)){
    var waHtml='WhatsApp uzerinden bize ulasabilirsiniz:<br><a class="shrf-wa" href="'+WA+'" target="_blank"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>WhatsApp ile Yaz</a>';
    msg(waHtml,'ai');
    logTurn(t,'[WhatsApp redirect shown]',[]);
    chips(['Magazalarimiz','Urun sor','Teslimat bilgisi']);
    busy=false;return;
  }

  typing(true);

  var content;
  var matches=search(t||'');
  var ctx=matches.length?('KATALOG:'+matches.map(function(p){return p.n+'|'+p.p+'|'+(p.b||'')+'|URL:'+p.u+'|IMG:'+(p.i||'');}).join('|')):'Eslesme yok.';

  if(ib){
    var imgTxt='Resimde ne var? Marka, urun tipi ve modeli belirle. Katalogdan bul veya benzer oner. '+(t||'');
    content=[{type:'image',source:{type:'base64',media_type:it,data:ib}},{type:'text',text:imgTxt}];
  } else {
    content=t+' '+ctx;
  }

  history.push({role:'user',content:content});
  if(history.length>10)history=history.slice(-10);

  fetch(API,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({messages:history,catalog:typeof CAT!=='undefined'?CAT:[]})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    typing(false);
    var raw='';
    if(data&&data.content)data.content.forEach(function(b){if(b.type==='text')raw+=b.text;});
    try{
      var parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
      history.push({role:'assistant',content:raw});
      var h=parsed.reply||'';
      if(parsed.products&&parsed.products.length)h+=cards(parsed.products);
      msg(h,'ai');
      var sp=(parsed.products||[]).map(function(p){return{name:p.n,price:p.p,brand:p.b,url:p.u};});
      logTurn(t||'[image]', parsed.reply||'', sp);
      chips(parsed.chips);
    }catch(e){
      try{
        var s2=raw.indexOf('{'),e2=raw.lastIndexOf('}');
        if(s2>-1&&e2>-1){
          var p2=JSON.parse(raw.substring(s2,e2+1));
          history.push({role:'assistant',content:raw});
          var h2=p2.reply||'';
          if(p2.products&&p2.products.length)h2+=cards(p2.products);
          msg(h2,'ai');
          var sp2=(p2.products||[]).map(function(p){return{name:p.n,price:p.p,brand:p.b,url:p.u};});
          logTurn(t||'[image]', p2.reply||'', sp2);
          chips(p2.chips);
        } else { msg('Bir hata olustu, lutfen tekrar deneyin.','ai'); }
      }catch(e2){ msg('Bir hata olustu, lutfen tekrar deneyin.','ai'); }
    }
    busy=false;
  })
  .catch(function(){
    typing(false);
    msg('Baglanti hatasi. Lutfen tekrar deneyin.','ai');
    busy=false;
  });
}

window.shrfChip=function(el){
  var t=el.textContent;
  if(t==='Magazalarimiz'){msg(t,'u');$('shrf-chips').innerHTML='';msg(storeCards(),'ai');logTurn(t,'[Store locations shown]',[]);chips(['Telefon numarasi','WhatsApp','Urun sor']);return;}
  if(t==='WhatsApp'){msg(t,'u');$('shrf-chips').innerHTML='';var wh='<a class="shrf-wa" href="'+WA+'" target="_blank">WhatsApp ile Yaz</a>';msg(wh,'ai');logTurn(t,'[WhatsApp redirect]',[]);chips(['Magazalarimiz','Urun sor']);return;}

};

$('shrf-snd').onclick=send;

var fi=document.createElement('input');
fi.type='file';fi.accept='image/*';fi.style.display='none';
document.body.appendChild(fi);
$('shrf-cam').onclick=function(){fi.click();};
fi.onchange=function(){
  var file=fi.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(e){
    imgB64=e.target.result.split(',')[1];imgType=file.type||'image/jpeg';
    var prev=$('shrf-img-preview');
    prev.innerHTML='<img src="'+e.target.result+'"/><span onclick="shrfClearImg()">Kaldir</span>';
    prev.style.display='flex';$('shrf-inp').placeholder='Bu resim hakkinda sorun...';
  };
  r.readAsDataURL(file);fi.value='';
};
window.shrfClearImg=function(){
  imgB64=null;imgType=null;
  var prev=$('shrf-img-preview');
  if(prev){prev.style.display='none';prev.innerHTML='';}
  $('shrf-inp').placeholder='Urun, teslimat, magaza sor...';
};

var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
  var recog=new SR();recog.continuous=false;recog.interimResults=true;recog.maxAlternatives=3;
  var listening=false;
  $('shrf-mic').onclick=function(){if(listening){recog.stop();return;}recog.lang='tr-TR';try{recog.start();}catch(e){}};
  recog.onstart=function(){listening=true;$('shrf-mic').classList.add('on');$('shrf-inp').placeholder='Dinliyorum...';};
  recog.onresult=function(e){
    var interim='',final='';
    for(var i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal){final+=e.results[i][0].transcript;}else{interim+=e.results[i][0].transcript;}}
    if(interim)$('shrf-inp').value=interim;
    if(final){$('shrf-inp').value=final;setTimeout(send,500);}
  };
  recog.onerror=function(e){if(recog.lang==='tr-TR'&&e.error!=='aborted'){recog.lang='en-US';try{recog.start();}catch(err){}}};
  recog.onend=function(){listening=false;$('shrf-mic').classList.remove('on');$('shrf-inp').placeholder='Urun, teslimat, magaza sor...';};
} else {$('shrf-mic').style.display='none';}

})();
