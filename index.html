function isStoreQuery(q){
  var kw=['magaza','mağaza','store','sube','şube','nerede','adres','konum','lokasyon','location'];
  q=q.toLowerCase();
  for(var i=0;i<kw.length;i++){if(q.indexOf(kw[i])>-1)return true;}
  return false;
}

function isWAQuery(q){
  var kw=['whatsapp','wp','watsapp','mesaj','iletisim','iletişim','contact','yazalim','yazalım'];
  q=q.toLowerCase();
  for(var i=0;i<kw.length;i++){if(q.indexOf(kw[i])>-1)return true;}
  return false;
}

function search(q){
  if(typeof CAT==='undefined'||!CAT.length)return[];
  var terms=q.toLowerCase().split(' ').filter(function(t){return t.length>1;});
  var minP=0,maxP=999999999;
  var priceMatch=q.match(/(\d+)\s*[-ile]+\s*(\d+)/i);
  if(priceMatch){minP=parseInt(priceMatch[1]);maxP=parseInt(priceMatch[2]);}
  var underMatch=q.match(/(\d[\d.]*)\s*(tl)?\s*(alti|under|max|kadar)/i);
  if(underMatch)maxP=parseInt(underMatch[1].replace('.',''));
  var scored=[];
  for(var i=0;i<CAT.length;i++){
    var p=CAT[i];
    var numP=parseInt((p.p||'0').replace(/\./g,'').replace(' TL',''));
    if(numP<minP||numP>maxP)continue;
    var txt=(p.n+' '+(p.b||'')+' '+(p.c||'')).toLowerCase();
    var s=0;
    for(var j=0;j<terms.length;j++){if(txt.indexOf(terms[j])>-1)s+=terms[j].length;}
    if(s>0)scored.push({p:p,s:s});
  }
  scored.sort(function(a,b){return b.s-a.s;});
  return scored.slice(0,5).map(function(x){return x.p;});
}

  var prev=$('shrf-img-preview');
  if(prev){prev.style.display='none';prev.innerHTML='';}
  $('shrf-inp').placeholder='Urun, teslimat, magaza sor...';
};

// Voice
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
  var recog=new SR();
  recog.continuous=false;recog.interimResults=true;recog.maxAlternatives=3;
  var listening=false;
  $('shrf-mic').onclick=function(){
    if(listening){recog.stop();return;}
    recog.lang='tr-TR';
    try{recog.start();}catch(e){}
  };
  recog.onstart=function(){listening=true;$('shrf-mic').classList.add('on');$('shrf-inp').placeholder='Dinliyorum...';};
  recog.onresult=function(e){
    var interim='',final='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){
        final+=e.results[i][0].transcript;
      } else {
        interim+=e.results[i][0].transcript;
      }
    }
    // Show interim results in input as user speaks
    if(interim)$('shrf-inp').value=interim;
    if(final){
      $('shrf-inp').value=final;
      setTimeout(send,500);
    }
  };
  recog.onerror=function(e){
    if(recog.lang==='tr-TR'&&e.error!=='aborted'){recog.lang='en-US';try{recog.start();}catch(err){}}
  };
  recog.onend=function(){listening=false;$('shrf-mic').classList.remove('on');$('shrf-inp').placeholder='Urun, teslimat, magaza sor...';};
} else {
  $('shrf-mic').style.display='none';
}

})();
</script>
</body>
</html>
